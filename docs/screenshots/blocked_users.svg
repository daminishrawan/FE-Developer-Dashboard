<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <!-- Background -->
  <rect width="1200" height="400" rx="12" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>
  
  <defs>
    <filter id="soft-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.05"/>
    </filter>
  </defs>

  <!-- Navigation / Search Bar Container -->
  <rect x="20" y="20" width="1160" height="70" rx="10" fill="#FFFFFF" filter="url(#soft-shadow)"/>
  
  <!-- Search Input -->
  <rect x="35" y="35" width="280" height="40" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <path d="M50 55 A 5 5 0 1 1 60 55 A 5 5 0 1 1 50 55 M58 58 L65 65" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" fill="none"/>
  <text x="72" y="60" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94A3B8">Search by Name, Email, or Mobile...</text>
  
  <!-- Role Dropdown -->
  <rect x="330" y="35" width="220" height="40" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <!-- Bag Icon -->
  <rect x="345" y="47" width="14" height="12" rx="2" fill="none" stroke="#94A3B8" stroke-width="1.5"/>
  <path d="M349 47 V44 H355 V47" fill="none" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round"/>
  <text x="368" y="60" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#475569">All Roles</text>
  <path d="M530 52 L534 56 L538 52" fill="none" stroke="#64748B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Status Dropdown (Active) -->
  <rect x="565" y="35" width="200" height="40" rx="8" fill="#FFFFFF" stroke="#6366F1" stroke-width="2"/>
  <circle cx="583" cy="55" r="3" fill="#6366F1"/>
  <text x="595" y="60" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1E293B">BLOCKED</text>
  <path d="M745 52 L749 56 L753 52" fill="none" stroke="#6366F1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Reset Button -->
  <rect x="780" y="35" width="80" height="40" rx="8" fill="#F1F5F9" stroke="none"/>
  <path d="M795 50 L803 58 M803 50 L795 58" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
  <text x="812" y="60" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#475569">Reset</text>

  <!-- Add Developer Button -->
  <rect x="1005" y="35" width="160" height="40" rx="8" fill="#4F46E5"/>
  <path d="M1020 58 A 4 4 0 0 1 1028 58 M1024 50 A 3 3 0 1 1 1024 44 A 3 3 0 1 1 1024 50 M1032 50 H1038 M1035 47 V53" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <text x="1045" y="59" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#FFFFFF">Add Developer</text>

  <!-- Main Table Container -->
  <rect x="20" y="105" width="1160" height="195" rx="10" fill="#FFFFFF" filter="url(#soft-shadow)"/>

  <!-- Table Headers -->
  <rect x="20" y="105" width="1160" height="45" rx="10" fill="#F8FAFC"/>
  <text x="40" y="132" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#475569" letter-spacing="0.5">USER ID</text>
  <path d="M92 124 L95 120 L98 124 M98 130 L95 134 L92 130" stroke="#4F46E5" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <text x="175" y="132" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#475569" letter-spacing="0.5">DEVELOPER DETAILS</text>
  
  <text x="450" y="132" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#475569" letter-spacing="0.5">ENGINEERING ROLE</text>
  <path d="M575 124 L578 120 L581 124 M581 130 L578 134 L575 130" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <text x="640" y="132" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#475569" letter-spacing="0.5">CONTACT</text>
  
  <text x="840" y="132" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#475569" letter-spacing="0.5">STATUS</text>
  
  <text x="960" y="132" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#475569" letter-spacing="0.5">JOINED DATE</text>
  <path d="M1047 124 L1050 120 L1053 124 M1053 130 L1050 134 L1047 130" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  
  <text x="1105" y="132" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#475569" letter-spacing="0.5">ACTIONS</text>

  <!-- Header Dividers -->
  <line x1="20" y1="150" x2="1180" y2="150" stroke="#EDF2F7" stroke-width="1"/>

  <!-- Row: Chloe Gallagher -->
  <!-- ID -->
  <rect x="35" y="185" width="60" height="24" rx="4" fill="#F1F5F9"/>
  <text x="44" y="201" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#475569">DEV-005</text>

  <!-- Avatar -->
  <circle cx="140" cy="195" r="20" fill="#FEE2E2"/>
  <circle cx="140" cy="191" r="7" fill="#BE123C"/>
  <path d="M127 207 C 127 199, 153 199, 153 207 Z" fill="#BE123C"/>

  <!-- Details -->
  <text x="175" y="193" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#1E293B">Chloe Gallagher</text>
  <path d="M285 183 a 4 4 0 0 0 -4 4 v 4 c 0 2.5 1.5 4.5 3.5 5.2" fill="#94A3B8"/>
  <text x="175" y="210" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#64748B">E2E testing automation engineer writing bulletproof Playwright and...</text>

  <!-- Role -->
  <text x="450" y="198" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#334155">QA Engineer</text>

  <!-- Contact -->
  <path d="M640 185 H652 V193 H640 Z M640 185 L646 189 L652 185" fill="none" stroke="#94A3B8" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="660" y="191" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#475569">chloe.g@debuggers.co</text>
  <rect x="642" y="198" width="8" height="12" rx="1" fill="none" stroke="#94A3B8" stroke-width="1"/>
  <text x="660" y="208" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#475569">+1 (555) 015-4422</text>

  <!-- Status -->
  <rect x="840" y="183" width="80" height="24" rx="12" fill="#FEE2E2"/>
  <circle cx="852" cy="195" r="3" fill="#EF4444"/>
  <text x="860" y="199" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#EF4444" letter-spacing="0.5">BLOCKED</text>

  <!-- Date -->
  <!-- Cal icon -->
  <rect x="960" y="188" width="12" height="12" rx="2" fill="none" stroke="#94A3B8" stroke-width="1"/>
  <text x="978" y="198" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#64748B">2026-03-01</text>

  <!-- Actions -->
  <!-- Edit Pencil -->
  <path d="M1105 186 L1113 194 M1111 184 L1116 189" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Trash -->
  <rect x="1135" y="187" width="10" height="11" rx="1" fill="none" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="1132" y1="184" x2="1148" y2="184" stroke="#94A3B8" stroke-width="1.5"/>
</svg>
